name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create zip
        run: |
          zip llm-wiki-agent.zip \
            agent.py \
            providers.py \
            tools.py \
            schema.py \
            requirements.txt \
            install.ps1 \
            README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: llm-wiki-agent.zip
          generate_release_notes: true